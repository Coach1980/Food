<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домашня їжа | Меню</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #fff8f0; color: #333; }
        header { text-align: center; padding: 60px 20px 40px; background: #f2e6da; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 42px; margin-bottom: 10px; color: #b85c38; }
        header p { font-size: 18px; color: #555; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h2 { font-family: 'Playfair Display', serif; font-size: 28px; color: #b85c38; margin: 40px 0 20px; border-bottom: 2px solid #e2c9b6; display: inline-block; padding-bottom: 5px; }
        .menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.12); }
        .card h3 { font-size: 18px; margin-bottom: 8px; color: #b85c38; }
        .price { font-size: 16px; font-weight: 600; color: #c07a56; margin-bottom: 5px; }
        .weight { font-size: 14px; color: #777; margin-bottom: 10px; }
        .contact { text-align: center; margin-top: 60px; padding: 40px 20px; background: #f2e6da; border-radius: 20px; }
        .contact a { display: inline-block; margin: 10px; padding: 12px 25px; border-radius: 30px; background: #b85c38; color: white; text-decoration: none; transition: 0.3s; }
        .contact a:hover { background: #a0482a; }
        footer { text-align: center; padding: 20px; font-size: 14px; color: #999; }
        @media (max-width: 600px) { header h1 { font-size: 32px; } }
    </style>
</head>
<body>
<header>
    <h1>Домашня їжа</h1>
    <p>Домашня кухня з любов'ю: вареники, пельмені, котлети та десерти</p>
</header>
<div class="container">

    <!-- Преміальне меню з усіма категоріями (повний список, як у попередньому коді) -->

</div>
<footer>

</html>
